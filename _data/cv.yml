cv:
  name: Esam Ghaleb
  label: Research Scientist
  location: Nijmegen, The Netherlands
  image: ""
  summary: Research Scientist at the Max Planck Institute for Psycholinguistics (Multimodal Language Department), working on multimodal communication and behaviour, representation learning, analysis, and generation.

  sections:
    Experience:
      - company: Max Planck Institute for Psycholinguistics
        position: Research Scientist, Multimodal Language Department
        location: Nijmegen, The Netherlands
        start_date: 2024-09
        end_date: present
        summary: Research on multimodal communication and behaviour, including representation learning, analysis, and generation.
        highlights:
          - Leads the Multimodal Modelling Cluster.

      - company: University of Amsterdam, Institute for Logic, Language and Computation (ILLC)
        position: Postdoctoral Researcher, Dialogue Modeling Group
        location: Amsterdam, The Netherlands
        start_date: 2022-09
        end_date: 2024-08
        summary: Research on face-to-face dialogue modelling, co-speech gesture segmentation and representation, and multimodal speech-gesture alignment.

      - company: Maastricht University, Department of Advanced Computing Sciences
        position: Postdoctoral Researcher, Cognitive Systems Group
        location: Maastricht, The Netherlands
        start_date: 2020-03
        end_date: 2022-08
        summary: Research on explainable AI for emotion recognition, behavioural analysis in healthcare, and self-supervised learning for sensor-based activity recognition.
        highlights:
          - Work package leader for the EU H2020 ProCare4Life project.

      - company: Maastricht University, Cognitive Systems Group
        position: Doctoral Researcher
        location: Maastricht, The Netherlands
        start_date: 2016-03
        end_date: 2020-02
        summary: Research on affective computing and machine learning, with a focus on multimodal audio-visual emotion recognition.
        highlights:
          - Co-represented Maastricht University tasks in the EU H2020 MaTHiSiS project.

      - company: Istanbul Technical University, Smart Interaction and Machine Intelligence Technologies (SiMiT) Lab
        position: Research Assistant
        location: Istanbul, Turkey
        start_date: 2013-07
        end_date: 2016-02
        summary: Research on computer vision and HCI, including face recognition and tracking, and retrieval of faces across age.

      - company: Karlsruhe Institute of Technology (KIT), CVHCI Lab
        position: Research Intern
        location: Karlsruhe, Germany
        start_date: 2014-06
        end_date: 2014-08
        summary: Built and annotated the Accio dataset for face track retrieval in movies (Harry Potter).
        highlights:
          - Returned in Summer 2015 for thesis-related research.

    Education:
      - institution: Maastricht University
        location: The Netherlands
        area: Affective Computing and Machine Learning
        studyType: Ph.D.
        start_date: 2016
        end_date: 2021
        highlights:
